# Сборка zip архива для релиза GitHub
name: Build ZIP for Release

on:
  # Запускать после публикации релиза
  release:
    types: [published]
  
  # Ручной запуск из вкладки Actions
  workflow_dispatch:
    inputs:
      tag:
        description: "Тег версии, например v0.1.0.2"
        required: true
        type: string
      upload_to_release:
        description: "Загрузить архивы в релиз"
        required: true
        default: true
        type: boolean

permissions:
  # Нужно для загрузки файлов в релиз
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Detect version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ inputs.tag }}"
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          
      - name: Prepare release folder
        run: |
          APP_NAME="${{ github.event.repository.name }}"
          VERSION="${{ github.event.release.tag_name }}"

          mkdir -p "build/$APP_NAME"
          mkdir -p "build/$APP_NAME/assets"

          # Копируем основные файлы проекта
          [ -f engine.css ] && cp engine.css "build/$APP_NAME/"
          [ -f engine.js ] && cp engine.js "build/$APP_NAME/"
          [ -f index.html ] && cp index.html "build/$APP_NAME/"
          [ -f story.js ] && cp story.js "build/$APP_NAME/"
          [ -f story-loader.js ] && cp story-loader.js "build/$APP_NAME/"

          # Копируем медиафайлы из assets
          if [ -d assets ]; then
            find assets -type f \( \
              -iname "*.jpg" -o \
              -iname "*.jpeg" -o \
              -iname "*.png" -o \
              -iname "*.mp3" \
            \) -exec cp {} "build/$APP_NAME/assets/" \;
          fi

          # Подставляем номер версии в index.html
          if [ -f "build/$APP_NAME/index.html" ]; then
            sed -i "s/__VERSION__/$VERSION/g" "build/$APP_NAME/index.html"
          fi

      - name: Create ZIP archive
        run: |
          APP_NAME="${{ github.event.repository.name }}"
          VERSION="${{ github.event.release.tag_name }}"

          cd build
          zip -r "../${APP_NAME}-${VERSION}.zip" "$APP_NAME"
          cd ..

          cp "${APP_NAME}-${VERSION}.zip" "${APP_NAME}-latest.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.event.repository.name }}-${{ github.event.release.tag_name }}.zip
            ${{ github.event.repository.name }}-latest.zip